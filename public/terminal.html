<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI System</title>

<style>
body{
background:black;
color:#00ffe1;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
text-align:center;
border:1px solid #00ffe1;
padding:40px;
box-shadow:0 0 20px #00ffe1;
}

h1{
letter-spacing:3px;
}

.glow{
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 5px #00ffe1; }
to{ text-shadow:0 0 20px #00ffe1; }
}
</style>

</head>
<body>

<div class="box">
<h1 class="glow">AI CORE ONLINE</h1>
<p>System Ready</p>
</div>

</body>
</html>
