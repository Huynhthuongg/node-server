<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terminal</title>

<style>
body{
background:black;
color:#00ff9c;
font-family:monospace;
margin:0;
padding:20px;
height:100vh;
}

#output{
white-space:pre-wrap;
margin-bottom:10px;
}

input{
background:black;
color:#00ff9c;
border:none;
outline:none;
width:100%;
font-size:16px;
font-family:monospace;
}
</style>

</head>
<body>

<div id="output"></div>
<input id="cmd" placeholder="type command..." autofocus>

<script>
const input = document.getElementById("cmd");
const output = document.getElementById("output");

function print(text){
output.innerHTML += text + "\n";
window.scrollTo(0,document.body.scrollHeight);
}

print("AETHON Terminal");
print("Server connected");
print("");

input.addEventListener("keydown", async (e)=>{
if(e.key === "Enter"){

let cmd = input.value;

print("> " + cmd);

let res = await fetch("/run?cmd=" + encodeURIComponent(cmd));
let text = await res.text();

print(text);

input.value = "";

}
});
</script>

</body>
</html>
