<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LED Terminal</title>

<style>
body{
background:black;
color:#00ff9c;
font-family:monospace;
margin:0;
padding:10px;
text-shadow:0 0 10px #00ff9c;
}

#terminal{
white-space:pre-wrap;
}

input{
width:100%;
background:black;
border:none;
outline:none;
color:#00ff9c;
font-family:monospace;
font-size:16px;
}
</style>
</head>

<body>

<div id="terminal">LED Terminal Connected\n</div>
<input id="cmd" autofocus />

<script>
const ws = new WebSocket(`wss://${location.host}`);
const term = document.getElementById("terminal");
const input = document.getElementById("cmd");

ws.onmessage = (e)=>{
term.textContent += e.data;
window.scrollTo(0,document.body.scrollHeight);
};

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
ws.send(input.value + "\n");
input.value="";
}
});
</script>

</body>
</html>
